<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windrose — Login</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f1117;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #e2e8f0;
        }

        .card {
            width: 100%;
            max-width: 380px;
            background: #1a1d27;
            border: 1px solid #2d3148;
            border-radius: 12px;
            padding: 40px 36px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo svg {
            width: 48px;
            height: 48px;
            color: #6366f1;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
            color: #f1f5f9;
        }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 28px;
        }

        .error {
            background: #3b1818;
            border: 1px solid #7f1d1d;
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            background: #0f1117;
            border: 1px solid #2d3148;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 18px;
        }

        input:focus {
            border-color: #6366f1;
        }

        input::placeholder {
            color: #475569;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 4px;
        }

        button[type="submit"]:hover {
            background: #4f46e5;
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <!-- Wind / compass rose icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <polygon points="12 2 14.5 9.5 12 12 9.5 9.5" />
                <polygon points="22 12 14.5 14.5 12 12 14.5 9.5" />
                <polygon points="12 22 9.5 14.5 12 12 14.5 14.5" />
                <polygon points="2 12 9.5 9.5 12 12 9.5 14.5" />
            </svg>
        </div>

        <h1>Windrose</h1>
        <p class="subtitle">Game Server Controller</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" autocomplete="off">
            <label for="username">Username</label>
            <input id="username" type="text" name="username" placeholder="Enter username" autocomplete="username"
                required autofocus />

            <label for="password">Password</label>
            <input id="password" type="password" name="password" placeholder="Enter password"
                autocomplete="current-password" required />

            <button type="submit">Sign In</button>
        </form>
    </div>
</body>

</html>
